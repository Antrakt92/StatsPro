name: Checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install check tools
        shell: pwsh
        run: .\scripts\install-check-tools.ps1 -Install

      - name: Check release metadata
        shell: pwsh
        run: |
          $toc = Get-Content -Path StatsPro.toc -Raw
          if ($toc -notmatch '(?m)^##\s+Version:\s*([0-9]+\.[0-9]+\.[0-9]+)\s*$') {
            throw 'Missing TOC Version.'
          }
          .\scripts\check-release-version.ps1 -Tag "v$($Matches[1])"

      - name: Lua checks
        shell: pwsh
        run: .\scripts\check-lua.ps1
