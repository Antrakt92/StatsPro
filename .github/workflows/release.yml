name: Package and release

on:
  # Publishing is tag-only. Existing releases are refused before marketplace upload.
  push:
    tags:
      - 'v*'

concurrency:
  # WARNING: the default single pending slot drops an older queued tag. Keep
  # every publication attempt serialized so marketplace uploads never overlap.
  group: statspro-release-publication
  queue: max

jobs:
  preflight:
    # Keep this in sync with the publishing job gate: forced/deleted tag events
    # must not run release machinery.
    if: ${{ github.event.created == true && github.event.forced == false && github.event.deleted == false }}
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify anonymous checkout boundary
        shell: pwsh
        run: ./scripts/check-anonymous-checkout.ps1

      - name: Check CI action refs
        shell: pwsh
        run: .\scripts\report-ci-action-refs.ps1 -EnforcePinnedWorkflowRefs

      - name: Check release ancestry
        shell: pwsh
        run: .\scripts\check-release-ancestry.ps1 -Tag $env:GITHUB_REF_NAME

      - name: Install check tools
        shell: pwsh
        run: .\scripts\install-check-tools.ps1 -Install -EnforceToolLocks

      - name: Check release version
        shell: pwsh
        run: .\scripts\check-release-version.ps1 -Tag $env:GITHUB_REF_NAME -EnforceSemVer

      - name: Lua checks
        shell: pwsh
        run: .\scripts\check-lua.ps1 -Release -ArchonMaxAgeDays 3 -EnforceToolLocks

  release:
    needs: preflight
    # WARNING: BigWigs Packager uploads to public marketplaces and is not
    # idempotent there. Re-running an old tag can create duplicate
    # CurseForge/Wago/WoWI files even if the GitHub Release already existed.
    # A real release is the first creation of a v* tag; history rewrites,
    # mirror pushes, and forced tag updates must not publish anything.
    if: ${{ github.event.created == true && github.event.forced == false && github.event.deleted == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify anonymous checkout boundary
        shell: pwsh
        run: ./scripts/check-anonymous-checkout.ps1

      - name: Refuse existing release marker
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: ./scripts/manage-github-release.ps1 -Mode RefuseExisting -Repository $env:GITHUB_REPOSITORY -ExpectedTag $env:GITHUB_REF_NAME

      - name: Trim release changelog
        shell: pwsh
        run: ./scripts/check-release-version.ps1 -Tag $env:GITHUB_REF_NAME -EnforceSemVer -ExportTopChangelogPath CHANGELOG.md

      - name: Check CI action refs
        shell: pwsh
        run: ./scripts/report-ci-action-refs.ps1 -EnforcePinnedWorkflowRefs

      - name: Install release validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1

      - name: Build package without publishing
        id: build-package
        uses: BigWigsMods/packager@6d50adb6e8517eefef63f4afb16a6518166a6b28
        with:
          args: -d

      - name: Validate package artifact
        shell: pwsh
        env:
          STATSPRO_ARCHIVE_PATH: ${{ steps.build-package.outputs.archive_path }}
          STATSPRO_PROJECT_VERSION: ${{ steps.build-package.outputs.project_version }}
        run: |
          ./scripts/check-package-dry-run.ps1 `
            -ArchivePath $env:STATSPRO_ARCHIVE_PATH `
            -ExpectedTag $env:GITHUB_REF_NAME `
            -PackagerProjectVersion $env:STATSPRO_PROJECT_VERSION `
            -PackageRoot (Join-Path ".release" "StatsPro") `
            -ManifestPath (Join-Path $env:RUNNER_TEMP "statspro-package-tree.before.sha256") `
            -ArchonMaxAgeDays 3 `
            -RequireExactPackagerProjectVersion `
            -EnforceToolLocks

      - name: Check marketplace versions
        shell: pwsh
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
        run: ./scripts/check-marketplace-versions.ps1

      - name: Recheck release ancestry before final package build
        shell: pwsh
        run: ./scripts/check-release-ancestry.ps1 -Tag $env:GITHUB_REF_NAME

      - name: Rebuild package without publishing
        id: rebuild-package
        uses: BigWigsMods/packager@6d50adb6e8517eefef63f4afb16a6518166a6b28
        with:
          args: -e -d

      - name: Compare rebuilt package and validate again
        shell: pwsh
        env:
          STATSPRO_ARCHIVE_PATH: ${{ steps.rebuild-package.outputs.archive_path }}
          STATSPRO_PROJECT_VERSION: ${{ steps.rebuild-package.outputs.project_version }}
        run: |
          ./scripts/check-package-dry-run.ps1 `
            -ArchivePath $env:STATSPRO_ARCHIVE_PATH `
            -ExpectedTag $env:GITHUB_REF_NAME `
            -PackagerProjectVersion $env:STATSPRO_PROJECT_VERSION `
            -PackageRoot (Join-Path ".release" "StatsPro") `
            -CompareManifestPath (Join-Path $env:RUNNER_TEMP "statspro-package-tree.before.sha256") `
            -ArchonMaxAgeDays 3 `
            -RequireExactPackagerProjectVersion `
            -EnforceToolLocks

      - name: Create draft release marker
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/manage-github-release.ps1 `
            -Mode CreateDraft `
            -Repository $env:GITHUB_REPOSITORY `
            -ExpectedTag $env:GITHUB_REF_NAME `
            -ExpectedCommitSha $env:GITHUB_SHA `
            -NotesPath CHANGELOG.md

      - name: Validate exact package immediately before marketplace upload
        shell: pwsh
        env:
          STATSPRO_ARCHIVE_PATH: ${{ steps.rebuild-package.outputs.archive_path }}
          STATSPRO_PROJECT_VERSION: ${{ steps.rebuild-package.outputs.project_version }}
        run: |
          $head = (git rev-parse HEAD).Trim()
          $tagCommit = (git rev-parse "refs/tags/$env:GITHUB_REF_NAME^{commit}").Trim()
          if ($LASTEXITCODE -ne 0 -or $head -notmatch '^[0-9a-f]{40}$' -or $tagCommit -notmatch '^[0-9a-f]{40}$') {
            throw "Could not resolve the release checkout boundary."
          }
          if (-not [System.StringComparer]::OrdinalIgnoreCase.Equals($head, $env:GITHUB_SHA) -or
              -not [System.StringComparer]::OrdinalIgnoreCase.Equals($tagCommit, $env:GITHUB_SHA)) {
            throw "Release checkout moved after final package validation."
          }
          ./scripts/check-package-dry-run.ps1 `
            -ArchivePath $env:STATSPRO_ARCHIVE_PATH `
            -ExpectedTag $env:GITHUB_REF_NAME `
            -PackagerProjectVersion $env:STATSPRO_PROJECT_VERSION `
            -PackageRoot (Join-Path ".release" "StatsPro") `
            -CompareManifestPath (Join-Path $env:RUNNER_TEMP "statspro-package-tree.before.sha256") `
            -ArchonMaxAgeDays 3 `
            -RequireExactPackagerProjectVersion `
            -EnforceToolLocks

      - name: Publish package to marketplaces
        id: publish-package
        uses: BigWigsMods/packager@6d50adb6e8517eefef63f4afb16a6518166a6b28
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}
        with:
          args: -c -e -o

      - name: Validate marketplace archive and create release metadata
        shell: pwsh
        env:
          STATSPRO_ARCHIVE_PATH: ${{ steps.publish-package.outputs.archive_path }}
          STATSPRO_PROJECT_VERSION: ${{ steps.publish-package.outputs.project_version }}
        run: |
          $releaseJsonPath = Join-Path ".release" "release.json"
          ./scripts/check-package-dry-run.ps1 `
            -ArchivePath $env:STATSPRO_ARCHIVE_PATH `
            -ExpectedTag $env:GITHUB_REF_NAME `
            -PackagerProjectVersion $env:STATSPRO_PROJECT_VERSION `
            -PackageRoot (Join-Path ".release" "StatsPro") `
            -CompareManifestPath (Join-Path $env:RUNNER_TEMP "statspro-package-tree.before.sha256") `
            -ArchonMaxAgeDays 3 `
            -RequireExactPackagerProjectVersion `
            -EnforceToolLocks
          ./scripts/check-release-artifact.ps1 `
            -ZipPath $env:STATSPRO_ARCHIVE_PATH `
            -ReleaseJsonPath $releaseJsonPath `
            -ExpectedTag $env:GITHUB_REF_NAME `
            -PackagerProjectVersion $env:STATSPRO_PROJECT_VERSION `
            -RequireExactPackagerProjectVersion `
            -WithReleaseJson `
            -WriteReleaseJson `
            -ArchonMaxAgeDays 3 `
            -EnforceToolLocks
          "STATSPRO_RELEASE_ARCHIVE=$((Resolve-Path -LiteralPath $env:STATSPRO_ARCHIVE_PATH).Path)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "STATSPRO_RELEASE_JSON=$((Resolve-Path -LiteralPath $releaseJsonPath).Path)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Attach validated assets to draft
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/manage-github-release.ps1 `
            -Mode AttachAssets `
            -Repository $env:GITHUB_REPOSITORY `
            -ExpectedTag $env:GITHUB_REF_NAME `
            -ArchivePath $env:STATSPRO_RELEASE_ARCHIVE `
            -ReleaseJsonPath $env:STATSPRO_RELEASE_JSON

      - name: Publish immutable GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/manage-github-release.ps1 `
            -Mode Publish `
            -Repository $env:GITHUB_REPOSITORY `
            -ExpectedTag $env:GITHUB_REF_NAME `
            -ExpectedCommitSha $env:GITHUB_SHA `
            -ArchivePath $env:STATSPRO_RELEASE_ARCHIVE `
            -ReleaseJsonPath $env:STATSPRO_RELEASE_JSON

      - name: Validate published immutable release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $assetDir = Join-Path $env:RUNNER_TEMP "statspro-release-assets"
          New-Item -ItemType Directory -Path $assetDir -Force | Out-Null

          function Save-ReleaseAsset {
            param([string]$Name)

            $path = Join-Path $assetDir $Name
            for ($attempt = 1; $attempt -le 6; $attempt++) {
              $output = @(gh release download $tag --repo $env:GITHUB_REPOSITORY --pattern $Name --dir $assetDir --clobber 2>&1)
              if ($LASTEXITCODE -eq 0 -and (Test-Path -LiteralPath $path -PathType Leaf)) {
                return $path
              }
              Write-Host "Release asset $Name not ready on attempt $attempt`: $($output -join ' ')"
              if ($attempt -lt 6) {
                Start-Sleep -Seconds ([Math]::Min(60, 5 * [Math]::Pow(2, $attempt - 1)))
              }
            }
            throw "Release asset $Name was not downloadable after retries."
          }

          $zipPath = Save-ReleaseAsset -Name "StatsPro-$tag.zip"
          $releaseJsonPath = Save-ReleaseAsset -Name "release.json"
          ./scripts/check-release-artifact.ps1 `
            -ZipPath $zipPath `
            -ReleaseJsonPath $releaseJsonPath `
            -ExpectedTag $tag `
            -PackagerProjectVersion $tag `
            -RequireExactPackagerProjectVersion `
            -WithReleaseJson `
            -ArchonMaxAgeDays 3 `
            -EnforceToolLocks
