name: Package and release

on:
  # Publishing is tag-only. Existing releases are refused before marketplace upload.
  push:
    tags:
      - 'v*'

jobs:
  preflight:
    # Keep this in sync with the publishing job gate: forced/deleted tag events
    # must not run release machinery.
    if: ${{ github.event.created == true && github.event.forced == false && github.event.deleted == false }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Report CI action refs
        shell: pwsh
        run: .\scripts\report-ci-action-refs.ps1 -ActionRefs "actions/checkout@v6"

      - name: Check release ancestry
        shell: pwsh
        run: .\scripts\check-release-ancestry.ps1 -Tag $env:GITHUB_REF_NAME

      - name: Install check tools
        shell: pwsh
        run: .\scripts\install-check-tools.ps1 -Install

      - name: Check release version
        shell: pwsh
        run: .\scripts\check-release-version.ps1 -Tag $env:GITHUB_REF_NAME -EnforceSemVer

      - name: Lua checks
        shell: pwsh
        run: .\scripts\check-lua.ps1 -Release -ArchonMaxAgeDays 3

  release:
    needs: preflight
    # WARNING: BigWigs Packager uploads to public marketplaces and is not
    # idempotent there. Re-running an old tag can create duplicate
    # CurseForge/Wago/WoWI files even if the GitHub Release already existed.
    # A real release is the first creation of a v* tag; history rewrites,
    # mirror pushes, and forced tag updates must not publish anything.
    if: ${{ github.event.created == true && github.event.forced == false && github.event.deleted == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Refuse existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # WARNING: This is a second marketplace safety gate, not a bug.
          # If a release for this tag exists, the tag has already been
          # packaged at least once. Stop before BigWigs Packager reaches
          # CurseForge/Wago/WoWI, where duplicate uploads are visible and
          # cleanup requires marketplace-specific manual/API deletion.
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $GITHUB_REF_NAME already exists; refusing to republish marketplace files."
            exit 1
          fi

      - name: Trim release changelog
        shell: pwsh
        run: ./scripts/check-release-version.ps1 -Tag $env:GITHUB_REF_NAME -EnforceSemVer -ExportTopChangelogPath CHANGELOG.md

      - name: Report CI action refs
        shell: pwsh
        run: |
          ./scripts/report-ci-action-refs.ps1 -ActionRefs @(
            "actions/checkout@v6",
            "BigWigsMods/packager@v2"
          )

      - name: Install release validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1

      - name: Build package without publishing
        uses: BigWigsMods/packager@v2
        with:
          args: -d

      - name: Validate package artifact
        shell: pwsh
        run: |
          $zip = @(Get-ChildItem -Path ".release" -Recurse -File -Filter "StatsPro-$env:GITHUB_REF_NAME.zip")
          if ($zip.Count -ne 1) {
            throw "Expected exactly one StatsPro-$env:GITHUB_REF_NAME.zip in .release; found $($zip.Count)."
          }
          $zip[0].FullName | Set-Content -LiteralPath (Join-Path $env:RUNNER_TEMP "statspro-package-zip-path.txt") -Encoding UTF8
          ./scripts/check-release-artifact.ps1 -ZipPath $zip[0].FullName -ExpectedTag $env:GITHUB_REF_NAME -PackageOnly -ArchonMaxAgeDays 3

      - name: Check marketplace versions
        shell: pwsh
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
        run: ./scripts/check-marketplace-versions.ps1

      - name: Save package tree manifest
        shell: pwsh
        run: |
          $root = (Resolve-Path ".release/StatsPro").Path
          Get-ChildItem -LiteralPath $root -Recurse -File |
            Sort-Object FullName |
            ForEach-Object {
              $relative = [System.IO.Path]::GetRelativePath($root, $_.FullName) -replace "\\", "/"
              $hash = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash
              "$relative`t$hash"
            } |
            Set-Content -LiteralPath (Join-Path $env:RUNNER_TEMP "statspro-package-tree.before.sha256") -Encoding UTF8

      - name: Rebuild package without publishing
        uses: BigWigsMods/packager@v2
        with:
          args: -e -d

      - name: Compare rebuilt package and validate again
        shell: pwsh
        run: |
          $root = (Resolve-Path ".release/StatsPro").Path
          $afterPath = Join-Path $env:RUNNER_TEMP "statspro-package-tree.after.sha256"
          Get-ChildItem -LiteralPath $root -Recurse -File |
            Sort-Object FullName |
            ForEach-Object {
              $relative = [System.IO.Path]::GetRelativePath($root, $_.FullName) -replace "\\", "/"
              $hash = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash
              "$relative`t$hash"
            } |
            Set-Content -LiteralPath $afterPath -Encoding UTF8

          $diff = Compare-Object `
            -ReferenceObject (Get-Content -LiteralPath (Join-Path $env:RUNNER_TEMP "statspro-package-tree.before.sha256")) `
            -DifferenceObject (Get-Content -LiteralPath $afterPath)
          if ($diff) {
            $diff | Format-Table -AutoSize | Out-String | Write-Host
            throw "Package tree is not repeatable between dry-run builds."
          }

          $zip = @(Get-ChildItem -Path ".release" -Recurse -File -Filter "StatsPro-$env:GITHUB_REF_NAME.zip")
          if ($zip.Count -ne 1) {
            throw "Expected exactly one StatsPro-$env:GITHUB_REF_NAME.zip in .release after rebuild; found $($zip.Count)."
          }
          ./scripts/check-release-artifact.ps1 -ZipPath $zip[0].FullName -ExpectedTag $env:GITHUB_REF_NAME -PackageOnly -ArchonMaxAgeDays 3

      - name: Publish package and release
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: -c -e -o
